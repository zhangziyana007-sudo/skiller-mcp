<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skiller - AI 技能管理器</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var saved = localStorage.getItem('skiller-theme');
      var theme = saved !== null ? saved : 'clean';
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="crayon-texture"></div>

  <div class="deco-star" style="top:15%;left:5%;animation-delay:0s">✦</div>
  <div class="deco-star" style="top:30%;right:8%;animation-delay:1s;font-size:18px">✧</div>
  <div class="deco-star" style="top:60%;left:3%;animation-delay:2s;font-size:20px">★</div>
  <div class="deco-star" style="top:80%;right:12%;animation-delay:3s">✦</div>
  <div class="deco-star" style="top:45%;right:3%;animation-delay:4s;font-size:16px">☆</div>

  <header>
    <div class="logo">
      <div class="logo-icon">S</div>
      <div>
        <h1>Skiller</h1>
        <div class="subtitle">AI 技能管理器</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="live-indicator" id="liveIndicator">
        <span class="live-dot" id="liveDot"></span>
        <span id="liveText">连接中...</span>
      </div>
      <button class="btn btn-red" onclick="showView('community')">🌍 社区</button>
      <button class="btn btn-green" onclick="showView('mcp')">🔌 MCP</button>
      <button class="btn" onclick="rescan()">🔄 重新扫描</button>
      <button class="btn btn-blue" onclick="showView('log')">📋 使用日志</button>
      <div style="position:relative">
        <button class="theme-toggle" onclick="toggleThemePicker()" id="themeToggle" title="切换主题">
          <span class="theme-label">主题</span>
          <span class="theme-name" id="themeNameDisplay">蜡笔小新</span>
        </button>
        <div class="theme-picker" id="themePicker">
          <div class="theme-option" data-theme-val="" onclick="setTheme('')">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #E53935, #FFD600)"></span> 蜡笔小新
          </div>
          <div class="theme-option" data-theme-val="clean" onclick="setTheme('clean')">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #f8f9fa, #dee2e6)"></span> 简洁
          </div>
          <div class="theme-option" data-theme-val="dark" onclick="setTheme('dark')">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #1a1a2e, #e94560)"></span> 暗黑
          </div>
          <div class="theme-option" data-theme-val="ocean" onclick="setTheme('ocean')">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #1565c0, #4fc3f7)"></span> 海洋
          </div>
          <div class="theme-option" data-theme-val="forest" onclick="setTheme('forest')">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #2e7d32, #81c784)"></span> 森林
          </div>
          <div class="theme-option" data-theme-val="sunset" onclick="setTheme('sunset')">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #e65100, #ff8f00)"></span> 日落
          </div>
        </div>
      </div>
      <div style="position:relative">
        <button class="version-badge" id="versionBadge" onclick="toggleUpdatePanel()" title="版本信息">
          <span class="ver-label">v</span><span class="ver-num" id="verNum">...</span>
        </button>
        <div class="update-panel" id="updatePanel">
          <div id="updatePanelContent">
            <div style="text-align:center; padding:20px; color:var(--text2)">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar">
      <h3>导航</h3>
      <div class="nav-item active" onclick="showView('myrepo')" onmouseenter="prefetchView('myrepo')">
        <span>📦 本地 Skill 管理</span>
        <span class="count" id="totalCount">0</span>
      </div>
      <div class="nav-item" onclick="showView('community')" onmouseenter="prefetchView('community')">
        <span>🌍 社区</span>
      </div>
      <div class="nav-item" onclick="showView('mcp')">
        <span>⚙️ MCP 管理</span>
      </div>
      <div class="nav-item" onclick="showView('log')">
        <span>📋 使用日志</span>
      </div>
      <div class="nav-item" onclick="showView('help')">
        <span>❓ 帮助</span>
      </div>
    </aside>

    <main class="content" id="content"></main>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h2 id="detailTitle">技能详情</h2>
      <button class="btn btn-red" onclick="closeDetail()">✕ 关闭</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
